<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Baking Site</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

    <h1>Baking Site</h1>
    <p class="subtitle">
        Tap a category and choose a recipe
    </p>

    <div class="categories-wrapper">

        <!-- Cookies Column -->
        <div class="category-column">
            <h2>Cookies</h2>

            <a href="https://example.com/chocolate-chip" class="recipe-link">
                Chocolate Chip
            </a>

            <a href="https://example.com/oatmeal-raisin" class="recipe-link">
                Oatmeal Raisin
            </a>

            <a href="https://example.com/snickerdoodle" class="recipe-link">
                Snickerdoodle
            </a>

        </div>

        <!-- Brownies Column -->
        <div class="category-column">
            <h2>Brownies</h2>

            <a href="https://example.com/classic-brownies" class="recipe-link">
                <img src="images/brownie_bites.jpeg" alt="Brownie Bites">
                Classic Brownies
            </a>

            <a href="https://example.com/fudge-brownies" class="recipe-link">
                Fudge Brownies
            </a>

            <a href="https://example.com/walnut-brownies" class="recipe-link">
                Walnut Brownies
            </a>

        </div>

        <!-- Cakes Column -->
        <div class="category-column">
            <h2>Cakes</h2>

            <a href="https://example.com/chocolate-cake" class="recipe-link">
                Chocolate Cake
            </a>

            <a href="https://example.com/vanilla-cake" class="recipe-link">
                Vanilla Cake
            </a>

            <a href="https://example.com/lemon-cake" class="recipe-link">
                Lemon Cake
            </a>

        </div>

    </div>

    <p class="footer-text">
        More recipes coming soon!
    </p>

</div>

</body>
</html>
