<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Oven body -->
  <rect x="15" y="20" width="70" height="65" rx="4" fill="#E8E8E8" stroke="#333" stroke-width="2"/>

  <!-- Oven door -->
  <rect x="22" y="45" width="56" height="35" rx="2" fill="#4A4A4A" stroke="#333" stroke-width="1.5"/>

  <!-- Oven window -->
  <rect x="28" y="50" width="44" height="25" rx="1" fill="#87CEEB" stroke="#555" stroke-width="1" opacity="0.7"/>

  <!-- Window grid lines -->
  <line x1="50" y1="50" x2="50" y2="75" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <line x1="28" y1="62.5" x2="72" y2="62.5" stroke="#555" stroke-width="0.5" opacity="0.5"/>

  <!-- Control panel -->
  <rect x="22" y="28" width="56" height="12" rx="1" fill="#D3D3D3" stroke="#333" stroke-width="1"/>

  <!-- Knobs -->
  <circle cx="35" cy="34" r="3.5" fill="#333" stroke="#222" stroke-width="0.8"/>
  <circle cx="50" cy="34" r="3.5" fill="#333" stroke="#222" stroke-width="0.8"/>
  <circle cx="65" cy="34" r="3.5" fill="#333" stroke="#222" stroke-width="0.8"/>

  <!-- Knob indicators -->
  <line x1="35" y1="31" x2="35" y2="33" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="50" y1="31" x2="50" y2="33" stroke="#888" stroke-width="1" stroke-linecap="round"/>
  <line x1="65" y1="31" x2="65" y2="33" stroke="#888" stroke-width="1" stroke-linecap="round"/>

  <!-- Door handle -->
  <rect x="30" y="81" width="40" height="3" rx="1.5" fill="#555" stroke="#333" stroke-width="0.5"/>
</svg>


